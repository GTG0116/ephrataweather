<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar - Ephrata Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <style>
        .radar-controls {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-md);
        }

        .radar-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition-smooth);
            white-space: nowrap;
        }

        .radar-controls button:hover {
            background: rgba(100, 180, 255, 0.2);
            border-color: rgba(100, 180, 255, 0.4);
        }

        .radar-controls input[type="range"] {
            flex: 1;
            accent-color: var(--accent-blue);
            min-width: 100px;
        }

        .opacity-control {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            padding: 10px 14px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-sm);
        }

        .opacity-control label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 4px;
        }

        .opacity-control input[type="range"] {
            width: 100px;
            accent-color: var(--accent-blue);
        }

        .radar-attribution {
            position: absolute;
            bottom: 80px;
            right: 16px;
            z-index: 10;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .radar-attribution a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        .radar-attribution a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .radar-controls {
                bottom: 12px;
                left: 8px;
                right: 8px;
                padding: 10px 12px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header glass-static">
            <div>
                <h1>Ephrata Weather</h1>
                <div class="location-search-container" id="location-search-container">
                    <span class="location" id="location-name">Loading...</span>
                </div>
            </div>
            <span class="badge" id="last-updated">Loading radar...</span>
        </header>

        <!-- Navigation -->
        <nav class="nav-bar glass-static">
            <a href="index.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                Home
            </a>
            <a href="currentconditions.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                Current
            </a>
            <a href="10dayforecast.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                10-Day
            </a>
            <a href="mrmsviewer.html" class="nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                Radar
            </a>
        </nav>

        <!-- Map Container -->
        <div class="map-container glass-static">
            <div id="map"></div>

            <!-- Info Overlay -->
            <div class="map-info-overlay glass-subtle" id="map-info">
                <div class="product-name" id="product-name">Radar</div>
                <div class="timestamp" id="data-timestamp">Loading...</div>
            </div>

            <!-- Opacity Control -->
            <div class="opacity-control">
                <label>Opacity</label>
                <input type="range" min="0" max="100" value="70" oninput="setOverlayOpacity(this.value)">
            </div>

            <!-- Timeline Controls -->
            <div class="radar-controls">
                <button id="play-btn" onclick="playAnimation()">Play</button>
                <input type="range" id="timeline-slider" min="0" max="0" value="0" oninput="onTimelineChange(this.value)">
                <button onclick="refreshRadar()">Refresh</button>
            </div>

            <!-- RainViewer Attribution -->
            <div class="radar-attribution">
                Radar data by <a href="https://www.rainviewer.com" target="_blank" rel="noopener">RainViewer</a>
            </div>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <p>Loading radar data...</p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/location.js"></script>
    <script src="js/mrms.js"></script>
</body>
</html>
