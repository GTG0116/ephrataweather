<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRMS Radar - Ephrata Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        .product-selector {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-md);
        }

        .product-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-smooth);
            font-family: inherit;
            white-space: nowrap;
        }

        .product-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .product-btn.active {
            color: var(--text-primary);
            background: rgba(100, 180, 255, 0.2);
        }

        .opacity-slider {
            position: absolute;
            bottom: 24px;
            right: 16px;
            z-index: 10;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-sm);
        }

        .opacity-slider label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 6px;
        }

        .opacity-slider input[type="range"] {
            width: 120px;
            accent-color: var(--accent-blue);
        }

        @media (max-width: 768px) {
            .product-selector {
                top: auto;
                bottom: 80px;
                left: 12px;
                right: 12px;
                transform: none;
                overflow-x: auto;
                scrollbar-width: none;
            }
            .product-selector::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header glass-static">
            <div>
                <h1>Ephrata Weather</h1>
                <span class="location">Ephrata, WA</span>
            </div>
            <span class="badge" id="last-updated">Loading MRMS...</span>
        </header>

        <!-- Navigation -->
        <nav class="nav-bar glass-static">
            <a href="index.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                Home
            </a>
            <a href="currentconditions.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                Current
            </a>
            <a href="10dayforecast.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                10-Day
            </a>
            <a href="mrmsviewer.html" class="nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                MRMS
            </a>
        </nav>

        <!-- Map Container -->
        <div class="map-container glass-static">
            <div id="map"></div>

            <!-- Product Selector -->
            <div class="product-selector">
                <button class="product-btn active" data-product="reflectivity" onclick="switchProduct('reflectivity', this)">Reflectivity</button>
                <button class="product-btn" data-product="precipRate" onclick="switchProduct('precipRate', this)">Precip Rate</button>
                <button class="product-btn" data-product="precipType" onclick="switchProduct('precipType', this)">Precip Type</button>
            </div>

            <!-- Info Overlay -->
            <div class="map-info-overlay glass-subtle" id="map-info">
                <div class="product-name" id="product-name">MRMS Reflectivity</div>
                <div class="timestamp" id="data-timestamp">Loading...</div>
            </div>

            <!-- Legend -->
            <div class="map-legend glass-subtle" id="map-legend">
                <!-- Populated by JS based on active product -->
            </div>

            <!-- Opacity Slider -->
            <div class="opacity-slider">
                <label>Overlay Opacity</label>
                <input type="range" min="0" max="100" value="70" id="opacity-slider" oninput="setOverlayOpacity(this.value)">
            </div>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <p>Loading MRMS data...</p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/mrms.js"></script>
</body>
</html>
