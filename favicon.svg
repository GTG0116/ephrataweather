<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy outer background -->
  <rect width="100" height="100" rx="18" fill="#0D1B2A"/>
  <!-- White border ring -->
  <rect x="3" y="3" width="94" height="94" rx="15" fill="none" stroke="white" stroke-width="4"/>
  <!-- Blue inner background -->
  <rect x="5" y="5" width="90" height="90" rx="13" fill="#4A8FE7"/>

  <!-- "Ephrata" text -->
  <text x="50" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#87CEEB" letter-spacing="1">Ephrata</text>

  <!-- Left cloud (light gray) -->
  <ellipse cx="22" cy="46" rx="11" ry="7" fill="#C0C0C0"/>
  <ellipse cx="15" cy="50" rx="8" ry="6" fill="#C0C0C0"/>
  <ellipse cx="30" cy="50" rx="8" ry="6" fill="#C0C0C0"/>

  <!-- Center cloud (darkest, largest) -->
  <ellipse cx="50" cy="41" rx="15" ry="10" fill="#4A4A4A"/>
  <ellipse cx="39" cy="47" rx="11" ry="8" fill="#4A4A4A"/>
  <ellipse cx="61" cy="47" rx="11" ry="8" fill="#4A4A4A"/>

  <!-- Right cloud (medium gray) -->
  <ellipse cx="78" cy="46" rx="11" ry="7" fill="#888"/>
  <ellipse cx="70" cy="50" rx="8" ry="6" fill="#888"/>
  <ellipse cx="86" cy="50" rx="8" ry="6" fill="#888"/>

  <!-- Rain dots -->
  <g fill="white" opacity="0.75">
    <circle cx="16" cy="60" r="1.3"/>
    <circle cx="22" cy="67" r="1.3"/>
    <circle cx="28" cy="61" r="1.3"/>
    <circle cx="34" cy="69" r="1.3"/>
    <circle cx="58" cy="63" r="1.3"/>
    <circle cx="64" cy="57" r="1.3"/>
    <circle cx="70" cy="67" r="1.3"/>
    <circle cx="76" cy="61" r="1.3"/>
    <circle cx="82" cy="69" r="1.3"/>
    <circle cx="88" cy="63" r="1.3"/>
    <circle cx="19" cy="73" r="1.3"/>
    <circle cx="31" cy="76" r="1.3"/>
    <circle cx="67" cy="74" r="1.3"/>
    <circle cx="79" cy="72" r="1.3"/>
  </g>

  <!-- Left lightning bolt -->
  <polygon points="41,47 36,61 42,61 35,76 47,58 41,58 47,47" fill="#FFD700"/>

  <!-- Right lightning bolt -->
  <polygon points="63,47 58,61 64,61 57,76 69,58 63,58 69,47" fill="#FFD700"/>

  <!-- Umbrella canopy -->
  <path d="M50,68 Q37,56 24,63 Q29,51 50,51 Q71,51 76,63 Q63,56 50,68Z" fill="#66BB6A"/>

  <!-- Umbrella stem -->
  <line x1="50" y1="68" x2="50" y2="80" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Umbrella hook -->
  <path d="M50,80 Q50,86 55,86 Q60,86 60,80" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "Weather" text -->
  <text x="50" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#87CEEB" letter-spacing="1">Weather</text>
</svg>
