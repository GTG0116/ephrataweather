<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Day Forecast - Ephrata Weather</title>
    <link rel="icon" type="image/png" href="IMG_0912.png">
    <link rel="apple-touch-icon" href="IMG_0912.png">
    <!-- Redirect to the SPA with the correct hash -->
    <script>window.location.replace('index.html#forecast');</script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header glass-static">
            <div>
                <h1>Ephrata Weather</h1>
                <div class="location-search-container" id="location-search-container">
                    <span class="location" id="location-name">Loading...</span>
                </div>
            </div>
            <span class="badge" id="last-updated">Loading...</span>
        </header>

        <!-- Navigation -->
        <nav class="nav-bar glass-static">
            <a href="index.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                Home
            </a>
            <a href="currentconditions.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                Current
            </a>
            <a href="10dayforecast.html" class="nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                10-Day
            </a>
            <a href="maps.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
                Maps
            </a>
        </nav>

        <!-- 10-Day Forecast -->
        <h3 class="section-title">10-Day Forecast</h3>
        <div class="glass-static fade-in" id="forecast-container">
            <div class="forecast-list" id="forecast-list">
                <div class="loading-shimmer loading-placeholder" style="width:100%;height:500px;"></div>
            </div>
        </div>

        <!-- Expanded Day Detail (shown on click) -->
        <div id="day-detail" class="card glass-static fade-in" style="margin-top:24px;display:none;padding:28px;">
            <div class="card-header">
                <span class="card-title" id="detail-day-name">--</span>
                <span class="badge" id="detail-date">--</span>
            </div>
            <div style="display:flex;align-items:center;gap:24px;margin:16px 0;">
                <div id="detail-icon" style="width:80px;height:80px;"></div>
                <div>
                    <div style="font-size:1.1rem;font-weight:500;" id="detail-condition">--</div>
                    <div style="font-size:2rem;font-weight:300;margin-top:4px;" id="detail-temps">--</div>
                </div>
            </div>
            <hr class="divider">
            <div class="cards-grid cards-grid-3" style="margin-top:16px;">
                <div style="text-align:center;">
                    <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">Precipitation</div>
                    <div style="font-size:1.1rem;font-weight:500;" id="detail-precip">--</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">Wind</div>
                    <div style="font-size:1.1rem;font-weight:500;" id="detail-wind">--</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">Humidity</div>
                    <div style="font-size:1.1rem;font-weight:500;" id="detail-humidity">--</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">UV Index</div>
                    <div style="font-size:1.1rem;font-weight:500;" id="detail-uv">--</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">Sunrise</div>
                    <div style="font-size:1.1rem;font-weight:500;" id="detail-sunrise">--</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">Sunset</div>
                    <div style="font-size:1.1rem;font-weight:500;" id="detail-sunset">--</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/location.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/weather-api.js"></script>
    <script src="js/forecast.js"></script>
</body>
</html>
