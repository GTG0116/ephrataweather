<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maps - Ephrata Weather</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <style>
        /* ---- Maps Page Styles ---- */
        .map-controls-panel {
            padding: 14px 16px 10px;
            margin-bottom: 12px;
        }

        .layer-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .layer-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-right: 4px;
        }

        .layer-btn {
            padding: 7px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.13);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: inherit;
            transition: all var(--transition-smooth);
        }

        .layer-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            color: var(--text-primary);
        }

        .layer-btn.active {
            background: rgba(100, 180, 255, 0.22);
            border-color: rgba(100, 180, 255, 0.45);
            color: #8dd4ff;
        }

        /* SPC sub-controls */
        .spc-controls {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        .spc-controls.visible {
            display: flex;
        }

        .ctrl-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .ctrl-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            min-width: 36px;
        }

        .day-btn {
            padding: 5px 11px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.78rem;
            font-family: inherit;
            transition: all var(--transition-smooth);
        }

        .day-btn:hover {
            background: rgba(255, 255, 255, 0.11);
            color: var(--text-secondary);
        }

        .day-btn.active {
            background: rgba(255, 160, 64, 0.2);
            border-color: rgba(255, 160, 64, 0.45);
            color: #FFA040;
        }

        .type-btn {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.78rem;
            font-family: inherit;
            transition: all var(--transition-smooth);
        }

        .type-btn:hover {
            background: rgba(255, 255, 255, 0.11);
            color: var(--text-secondary);
        }

        .type-btn.active {
            background: rgba(100, 220, 160, 0.15);
            border-color: rgba(100, 220, 160, 0.35);
            color: #64DCa0;
        }

        /* Radar sub-controls */
        .radar-controls {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        .radar-controls.visible {
            display: flex;
        }

        /* OWM sub-controls */
        .owm-controls {
            display: none;
            align-items: center;
            gap: 12px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .owm-controls.visible {
            display: flex;
        }

        .owm-controls input[type="range"] {
            width: 100px;
            accent-color: var(--accent-blue);
        }

        /* Opacity row in radar */
        .opacity-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .opacity-row input[type="range"] {
            width: 110px;
            accent-color: var(--accent-blue);
        }

        /* Timeline row in radar */
        .timeline-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timeline-row button {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.78rem;
            font-family: inherit;
            white-space: nowrap;
            transition: all var(--transition-smooth);
        }

        .timeline-row button:hover {
            background: rgba(100, 180, 255, 0.2);
        }

        .timeline-row input[type="range"] {
            flex: 1;
            max-width: 240px;
            accent-color: var(--accent-blue);
        }

        .radar-ts {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        /* Map Wrapper */
        .map-wrapper {
            position: relative;
            height: calc(100vh - 310px);
            min-height: 460px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 16px;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* SPC Legend inside map */
        .spc-legend {
            position: absolute;
            bottom: 16px;
            right: 16px;
            z-index: 10;
            padding: 10px 13px;
            background: rgba(12, 18, 38, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: var(--radius-sm);
            font-size: 0.72rem;
            display: none;
        }

        .spc-legend.visible {
            display: block;
        }

        .legend-title {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 7px;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .legend-swatch {
            width: 18px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Map Loading */
        .map-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(12, 18, 38, 0.65);
            backdrop-filter: blur(6px);
            z-index: 30;
            gap: 10px;
            border-radius: var(--radius-lg);
        }

        .map-loading p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Mapbox popup overrides */
        .mapboxgl-popup-content {
            background: rgba(12, 18, 38, 0.95) !important;
            border: 1px solid rgba(255, 255, 255, 0.18) !important;
            color: #fff !important;
            padding: 12px 16px !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45) !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.85rem;
        }

        .mapboxgl-popup-close-button {
            color: rgba(255, 255, 255, 0.5) !important;
            font-size: 18px !important;
        }

        .mapboxgl-popup-anchor-bottom .mapboxgl-popup-tip {
            border-top-color: rgba(12, 18, 38, 0.95) !important;
        }

        .mapboxgl-popup-anchor-top .mapboxgl-popup-tip {
            border-bottom-color: rgba(12, 18, 38, 0.95) !important;
        }

        .popup-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #8dd4ff;
        }

        .popup-stat {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .popup-stat:last-child {
            border-bottom: none;
        }

        .popup-key {
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .popup-val {
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* OWM key warning */
        .owm-key-warn {
            display: none;
            padding: 8px 14px;
            background: rgba(255, 160, 64, 0.12);
            border: 1px solid rgba(255, 160, 64, 0.3);
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            color: #FFA040;
            margin-top: 6px;
        }

        .owm-key-warn.visible {
            display: block;
        }

        /* SPC error notice */
        .layer-notice {
            font-size: 0.78rem;
            color: var(--text-muted);
            padding: 4px 0;
        }

        @media (max-width: 640px) {
            .map-wrapper {
                height: calc(100vh - 360px);
                min-height: 380px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="app-container">

        <!-- Header -->
        <header class="app-header glass-static">
            <div>
                <h1>Ephrata Weather</h1>
                <div class="location-search-container" id="location-search-container">
                    <span class="location" id="location-name">Loading...</span>
                </div>
            </div>
            <span class="badge" id="last-updated">Maps</span>
        </header>

        <!-- Navigation -->
        <nav class="nav-bar glass-static">
            <a href="index.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                Home
            </a>
            <a href="currentconditions.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                Current
            </a>
            <a href="10dayforecast.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                10-Day
            </a>
            <a href="maps.html" class="nav-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
                Maps
            </a>
        </nav>

        <!-- Map Controls Panel -->
        <div class="map-controls-panel glass-static" style="margin-bottom:14px;">

            <!-- Layer Selector -->
            <div class="layer-row">
                <span class="layer-label">Layer:</span>
                <button class="layer-btn active" data-layer="spc" onclick="switchLayer('spc')">SPC Outlook</button>
                <button class="layer-btn" data-layer="radar" onclick="switchLayer('radar')">Radar</button>
                <button class="layer-btn" data-layer="temperature" onclick="switchLayer('temperature')">Temperature</button>
                <button class="layer-btn" data-layer="wind" onclick="switchLayer('wind')">Wind Speed</button>
            </div>

            <!-- SPC Sub-Controls -->
            <div class="spc-controls visible" id="spc-controls">
                <div class="ctrl-row">
                    <span class="ctrl-label">Day:</span>
                    <button class="day-btn active" data-day="1" onclick="selectDay(1)">Day 1</button>
                    <button class="day-btn" data-day="2" onclick="selectDay(2)">Day 2</button>
                    <button class="day-btn" data-day="3" onclick="selectDay(3)">Day 3</button>
                    <button class="day-btn" data-day="4" onclick="selectDay(4)">Day 4</button>
                    <button class="day-btn" data-day="5" onclick="selectDay(5)">Day 5</button>
                    <button class="day-btn" data-day="6" onclick="selectDay(6)">Day 6</button>
                    <button class="day-btn" data-day="7" onclick="selectDay(7)">Day 7</button>
                    <button class="day-btn" data-day="8" onclick="selectDay(8)">Day 8</button>
                </div>
                <div class="ctrl-row" id="type-row">
                    <span class="ctrl-label">Type:</span>
                    <!-- Populated dynamically -->
                </div>
            </div>

            <!-- Radar Sub-Controls -->
            <div class="radar-controls" id="radar-controls">
                <div class="timeline-row">
                    <button id="play-btn" onclick="toggleRadarPlay()">&#9654; Play</button>
                    <input type="range" id="timeline-slider" min="0" max="0" value="0" oninput="onTimelineChange(this.value)">
                    <span class="radar-ts" id="radar-ts">--</span>
                    <button onclick="refreshRadar()">&#x21bb; Refresh</button>
                </div>
                <div class="opacity-row">
                    <span>Opacity:</span>
                    <input type="range" min="0" max="100" value="70" oninput="setRadarOpacity(this.value)">
                </div>
            </div>

            <!-- OWM Sub-Controls -->
            <div class="owm-controls" id="owm-controls">
                <span style="font-size:0.8rem;color:var(--text-secondary);">
                    <svg style="vertical-align:middle;margin-right:4px;" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Click the map to see exact values
                </span>
                <span>Opacity:</span>
                <input type="range" min="0" max="100" value="70" oninput="setOWMOpacity(this.value)" id="owm-opacity">
            </div>

            <!-- OWM Key Warning -->
            <div class="owm-key-warn" id="owm-key-warn">
                &#9888; OpenWeatherMap API key not set. Add your key to <code>js/config.js</code> as <code>OWM_API_KEY</code>.
            </div>
        </div>

        <!-- Map -->
        <div class="map-wrapper glass-static">
            <div id="map"></div>

            <!-- SPC Legend -->
            <div class="spc-legend visible" id="spc-legend">
                <div class="legend-title" id="legend-title">Categorical Risk</div>
                <div id="legend-items"></div>
            </div>

            <!-- Map Loading Overlay -->
            <div class="map-loading" id="map-loading">
                <div class="spinner"></div>
                <p id="loading-msg">Loading map...</p>
            </div>
        </div>

    </div><!-- end app-container -->

    <script src="js/config.js"></script>
    <script src="js/location.js"></script>
    <script>
    // ============================================================
    // MAPS PAGE - SPC Outlook, Radar, OWM Temperature & Wind
    // ============================================================

    // ---- State ----
    let map = null;
    let currentLayer = 'spc';
    let currentDay = 1;
    let currentType = 'cat';
    // ID of the first symbol layer in the Mapbox style — data layers are
    // inserted before this so place-name labels always render on top.
    let firstSymbolLayerId = undefined;

    // Radar state
    let radarFrames = [];
    let rainviewerHost = '';
    let radarPlaying = false;
    let currentFrameIdx = 0;

    // ---- SPC URL Map ----
    const SPC_URLS = {
        1: {
            cat:  'https://www.spc.noaa.gov/products/outlook/day1otlk_cat.nolyr.geojson',
            torn: 'https://www.spc.noaa.gov/products/outlook/day1otlk_torn.nolyr.geojson',
            wind: 'https://www.spc.noaa.gov/products/outlook/day1otlk_wind.nolyr.geojson',
            hail: 'https://www.spc.noaa.gov/products/outlook/day1otlk_hail.nolyr.geojson',
        },
        2: {
            cat:  'https://www.spc.noaa.gov/products/outlook/day2otlk_cat.nolyr.geojson',
            torn: 'https://www.spc.noaa.gov/products/outlook/day2otlk_torn.nolyr.geojson',
            wind: 'https://www.spc.noaa.gov/products/outlook/day2otlk_wind.nolyr.geojson',
            hail: 'https://www.spc.noaa.gov/products/outlook/day2otlk_hail.nolyr.geojson',
        },
        3: {
            cat:  'https://www.spc.noaa.gov/products/outlook/day3otlk.nolyr.geojson',
            prob: 'https://www.spc.noaa.gov/products/outlook/day3otlk_prob.nolyr.geojson',
        },
        4: { prob: 'https://www.spc.noaa.gov/products/expprobotlk/day4prob.nolyr.geojson' },
        5: { prob: 'https://www.spc.noaa.gov/products/expprobotlk/day5prob.nolyr.geojson' },
        6: { prob: 'https://www.spc.noaa.gov/products/expprobotlk/day6prob.nolyr.geojson' },
        7: { prob: 'https://www.spc.noaa.gov/products/expprobotlk/day7prob.nolyr.geojson' },
        8: { prob: 'https://www.spc.noaa.gov/products/expprobotlk/day8prob.nolyr.geojson' },
    };

    // Types available per day
    const DAY_TYPES = {
        1: [
            { key: 'cat',  label: 'Categorical' },
            { key: 'torn', label: 'Tornado' },
            { key: 'wind', label: 'Wind' },
            { key: 'hail', label: 'Hail' },
        ],
        2: [
            { key: 'cat',  label: 'Categorical' },
            { key: 'torn', label: 'Tornado' },
            { key: 'wind', label: 'Wind' },
            { key: 'hail', label: 'Hail' },
        ],
        3: [
            { key: 'cat',  label: 'Categorical' },
            { key: 'prob', label: 'Probability' },
        ],
        4: [{ key: 'prob', label: 'Probability' }],
        5: [{ key: 'prob', label: 'Probability' }],
        6: [{ key: 'prob', label: 'Probability' }],
        7: [{ key: 'prob', label: 'Probability' }],
        8: [{ key: 'prob', label: 'Probability' }],
    };

    // ---- SPC Legend Data ----
    const CAT_LEGEND = [
        { fill: 'rgba(192,232,192,0.55)', stroke: '#96D896', label: 'Thunderstorm' },
        { fill: 'rgba(102,204,102,0.55)', stroke: '#44BB44', label: 'Marginal' },
        { fill: 'rgba(255,224,102,0.55)', stroke: '#DDBB00', label: 'Slight' },
        { fill: 'rgba(255,160,64,0.55)',  stroke: '#CC7700', label: 'Enhanced' },
        { fill: 'rgba(255,96,96,0.55)',   stroke: '#CC2222', label: 'Moderate' },
        { fill: 'rgba(255,64,255,0.55)',  stroke: '#CC00CC', label: 'High' },
    ];
    const PROB_LEGEND = [
        { fill: 'rgba(100,0,180,0.60)',  stroke: '#6600CC', label: '60%+' },
        { fill: 'rgba(160,0,200,0.58)',  stroke: '#9900BB', label: '45%+' },
        { fill: 'rgba(220,30,30,0.58)',  stroke: '#BB1111', label: '30%+' },
        { fill: 'rgba(255,140,0,0.55)',  stroke: '#CC7000', label: '15%+' },
        { fill: 'rgba(255,220,0,0.55)',  stroke: '#CCAA00', label: '10%+' },
        { fill: 'rgba(100,200,60,0.55)', stroke: '#55AA00', label: '5%+' },
        { fill: 'rgba(80,180,80,0.50)',  stroke: '#339933', label: '2%+' },
    ];

    // ---- Mapbox paint expressions — evaluated natively by the renderer ----
    // Categorical: match on the LABEL string property
    const CAT_FILL_EXPR = ['match', ['upcase', ['coalesce', ['get', 'LABEL'], '']],
        'TSTM', 'rgba(192,232,192,0.55)',
        'MRGL', 'rgba(102,204,102,0.55)',
        'SLGT', 'rgba(255,224,102,0.55)',
        'ENH',  'rgba(255,160,64,0.55)',
        'MDT',  'rgba(255,96,96,0.55)',
        'HIGH', 'rgba(255,64,255,0.55)',
        'rgba(0,0,0,0)'
    ];
    const CAT_LINE_EXPR = ['match', ['upcase', ['coalesce', ['get', 'LABEL'], '']],
        'TSTM', '#96D896',
        'MRGL', '#44BB44',
        'SLGT', '#DDBB00',
        'ENH',  '#CC7700',
        'MDT',  '#CC2222',
        'HIGH', '#CC00CC',
        'rgba(0,0,0,0)'
    ];

    // Probability: step on the numeric LABEL value.
    // Non-numeric values (e.g. "SIGN" hatching) convert to 0 → transparent.
    const PROB_NUM = ['coalesce', ['to-number', ['get', 'LABEL']], 0];
    const PROB_FILL_EXPR = ['step', PROB_NUM,
        'rgba(0,0,0,0)',
        2,  'rgba(80,180,80,0.50)',
        5,  'rgba(100,200,60,0.55)',
        10, 'rgba(255,220,0,0.55)',
        15, 'rgba(255,140,0,0.55)',
        30, 'rgba(220,30,30,0.58)',
        45, 'rgba(160,0,200,0.58)',
        60, 'rgba(100,0,180,0.60)'
    ];
    const PROB_LINE_EXPR = ['step', PROB_NUM,
        'rgba(0,0,0,0)',
        2,  '#339933',
        5,  '#55AA00',
        10, '#CCAA00',
        15, '#CC7000',
        30, '#BB1111',
        45, '#8800AA',
        60, '#6600BB'
    ];

    // ---- Legend Helpers ----
    function updateSPCLegend(type) {
        document.getElementById('spc-legend').classList.add('visible');
        document.getElementById('legend-title').textContent =
            type === 'cat' ? 'Categorical Risk' : 'Probability';
        const data = type === 'cat' ? CAT_LEGEND : PROB_LEGEND;
        document.getElementById('legend-items').innerHTML = data.map(e => `
            <div class="legend-row">
                <div class="legend-swatch" style="background:${e.fill};border:1px solid ${e.stroke};"></div>
                <span>${e.label}</span>
            </div>`).join('');
    }

    function hideSPCLegend() {
        document.getElementById('spc-legend').classList.remove('visible');
    }

    // ---- Map Layer Management ----
    function removeLayer(id) { if (map.getLayer(id))  map.removeLayer(id); }
    function removeSource(id){ if (map.getSource(id)) map.removeSource(id); }

    function clearSPCLayers() {
        removeLayer('spc-fill');
        removeLayer('spc-line');
        removeSource('spc-data');
    }
    function clearRadarLayers() {
        removeLayer('radar-layer');
        removeSource('radar-source');
    }
    function clearOWMLayers() {
        removeLayer('owm-layer');
        removeSource('owm-source');
    }

    // ---- SPC Outlook ----
    async function loadSPCLayer(day, type) {
        const url = SPC_URLS[day]?.[type];
        if (!url) { clearSPCLayers(); hideSPCLegend(); return; }

        showLoading('Loading SPC Day ' + day + ' outlook…');
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();

            clearSPCLayers();

            // Use the raw GeoJSON — Mapbox expressions handle the colour mapping.
            map.addSource('spc-data', { type: 'geojson', data });

            const isCat = (type === 'cat');
            // Insert before the first symbol layer so town/city labels
            // from the base style remain visible above the SPC polygons.
            map.addLayer({
                id: 'spc-fill',
                type: 'fill',
                source: 'spc-data',
                paint: {
                    'fill-color':     isCat ? CAT_FILL_EXPR : PROB_FILL_EXPR,
                    'fill-antialias': true
                }
            }, firstSymbolLayerId);

            map.addLayer({
                id: 'spc-line',
                type: 'line',
                source: 'spc-data',
                paint: {
                    'line-color': isCat ? CAT_LINE_EXPR : PROB_LINE_EXPR,
                    'line-width': 1.2
                }
            }, firstSymbolLayerId);

            updateSPCLegend(type);
        } catch (e) {
            console.error('SPC fetch error:', e);
            clearSPCLayers();
            hideSPCLegend();
        } finally {
            hideLoading();
        }
    }

    // ---- Radar (RainViewer) ----
    async function loadRadarData() {
        showLoading('Loading radar data...');
        try {
            const resp = await fetch('https://api.rainviewer.com/public/weather-maps.json');
            const data = await resp.json();
            rainviewerHost = data.host;
            const past    = data.radar?.past    || [];
            const nowcast = data.radar?.nowcast || [];
            radarFrames = [...past, ...nowcast];

            const slider = document.getElementById('timeline-slider');
            slider.max   = radarFrames.length - 1;
            slider.value = radarFrames.length - 1;

            showRadarFrame(radarFrames.length - 1);
        } catch (e) {
            console.error('Radar error:', e);
            hideLoading();
        }
    }

    function showRadarFrame(idx) {
        clearRadarLayers();
        if (!radarFrames[idx]) { hideLoading(); return; }
        currentFrameIdx = idx;

        const frame = radarFrames[idx];
        const tileUrl = `${rainviewerHost}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`;

        map.addSource('radar-source', {
            type: 'raster', tiles: [tileUrl], tileSize: 256, attribution: 'RainViewer'
        });

        // Insert before symbol layers so labels remain on top
        map.addLayer({
            id: 'radar-layer',
            type: 'raster',
            source: 'radar-source',
            paint: { 'raster-opacity': currentRadarOpacity }
        }, firstSymbolLayerId);

        const ts = new Date(frame.time * 1000);
        const tsEl = document.getElementById('radar-ts');
        if (tsEl) tsEl.textContent = ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

        document.getElementById('timeline-slider').value = idx;
        hideLoading();
    }

    let currentRadarOpacity = 0.7;

    function setRadarOpacity(val) {
        currentRadarOpacity = val / 100;
        if (map.getLayer('radar-layer'))
            map.setPaintProperty('radar-layer', 'raster-opacity', currentRadarOpacity);
    }

    let radarInterval = null;

    function toggleRadarPlay() {
        const btn = document.getElementById('play-btn');
        if (radarPlaying) {
            clearInterval(radarInterval);
            radarPlaying = false;
            btn.innerHTML = '&#9654; Play';
        } else {
            radarPlaying = true;
            btn.innerHTML = '&#9646;&#9646; Pause';
            radarInterval = setInterval(() => {
                const next = (currentFrameIdx + 1) % radarFrames.length;
                showRadarFrame(next);
            }, 500);
        }
    }

    function onTimelineChange(val) {
        if (radarPlaying) {
            clearInterval(radarInterval);
            radarPlaying = false;
            document.getElementById('play-btn').innerHTML = '&#9654; Play';
        }
        showRadarFrame(parseInt(val));
    }

    function refreshRadar() {
        if (radarPlaying) toggleRadarPlay();
        loadRadarData();
    }

    // ---- OWM Overlays ----
    let currentOWMOpacity = 0.7;

    function loadOWMLayer(type) {
        const key = (typeof CONFIG !== 'undefined') ? CONFIG.OWM_API_KEY : '';
        const warn = document.getElementById('owm-key-warn');

        if (!key || key === 'YOUR_OWM_API_KEY_HERE') {
            warn.classList.add('visible');
            clearOWMLayers();
            return;
        }
        warn.classList.remove('visible');

        clearSPCLayers();
        clearRadarLayers();
        clearOWMLayers();
        hideSPCLegend();

        const layerName = type === 'temperature' ? 'temp_new' : 'wind_new';

        map.addSource('owm-source', {
            type: 'raster',
            tiles: [`https://tile.openweathermap.org/map/${layerName}/{z}/{x}/{y}.png?appid=${key}`],
            tileSize: 256,
            attribution: '&copy; <a href="https://openweathermap.org">OpenWeatherMap</a>'
        });

        // Insert before symbol layers so town labels remain on top
        map.addLayer({
            id: 'owm-layer',
            type: 'raster',
            source: 'owm-source',
            paint: { 'raster-opacity': currentOWMOpacity }
        }, firstSymbolLayerId);
    }

    function setOWMOpacity(val) {
        currentOWMOpacity = val / 100;
        if (map.getLayer('owm-layer')) {
            map.setPaintProperty('owm-layer', 'raster-opacity', currentOWMOpacity);
        }
    }

    // Click on map → OWM exact value popup
    async function handleOWMClick(e) {
        if (currentLayer !== 'temperature' && currentLayer !== 'wind') return;

        const key = (typeof CONFIG !== 'undefined') ? CONFIG.OWM_API_KEY : '';
        if (!key || key === 'YOUR_OWM_API_KEY_HERE') return;

        const { lat, lng } = e.lngLat;
        try {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lng}&appid=${key}&units=imperial`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('OWM API error ' + resp.status);
            const data = await resp.json();

            const cityName = data.name || 'This location';
            const temp = data.main?.temp != null ? Math.round(data.main.temp) + '°F' : '--';
            const feelsLike = data.main?.feels_like != null ? Math.round(data.main.feels_like) + '°F' : '--';
            const windSpeed = data.wind?.speed != null ? Math.round(data.wind.speed) + ' mph' : '--';
            const windGust  = data.wind?.gust  != null ? Math.round(data.wind.gust)  + ' mph' : null;
            const windDir   = data.wind?.deg   != null ? degToCardinal(data.wind.deg) : '--';
            const humidity  = data.main?.humidity != null ? data.main.humidity + '%' : '--';

            let html = `<div class="popup-title">${cityName}</div>`;

            if (currentLayer === 'temperature') {
                html += `
                    <div class="popup-stat"><span class="popup-key">Temperature</span><span class="popup-val">${temp}</span></div>
                    <div class="popup-stat"><span class="popup-key">Feels Like</span><span class="popup-val">${feelsLike}</span></div>
                    <div class="popup-stat"><span class="popup-key">Humidity</span><span class="popup-val">${humidity}</span></div>`;
            } else {
                html += `
                    <div class="popup-stat"><span class="popup-key">Wind Speed</span><span class="popup-val">${windSpeed}</span></div>
                    ${windGust ? `<div class="popup-stat"><span class="popup-key">Gusts</span><span class="popup-val">${windGust}</span></div>` : ''}
                    <div class="popup-stat"><span class="popup-key">Direction</span><span class="popup-val">${windDir}</span></div>`;
            }

            new mapboxgl.Popup({ closeButton: true, maxWidth: '220px' })
                .setLngLat(e.lngLat)
                .setHTML(html)
                .addTo(map);
        } catch (err) {
            console.error('OWM click error:', err);
        }
    }

    function degToCardinal(deg) {
        const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
        return dirs[Math.round(deg / 22.5) % 16];
    }

    // ---- Layer Switcher ----
    function switchLayer(layer) {
        currentLayer = layer;

        // Update layer buttons
        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.layer === layer);
        });

        // Toggle sub-control panels
        document.getElementById('spc-controls').classList.toggle('visible', layer === 'spc');
        document.getElementById('radar-controls').classList.toggle('visible', layer === 'radar');
        document.getElementById('owm-controls').classList.toggle('visible', layer === 'temperature' || layer === 'wind');

        // Clear all layers
        clearSPCLayers();
        clearRadarLayers();
        clearOWMLayers();
        hideSPCLegend();
        if (radarPlaying) toggleRadarPlay();

        if (layer === 'spc') {
            loadSPCLayer(currentDay, currentType);
        } else if (layer === 'radar') {
            loadRadarData();
        } else if (layer === 'temperature' || layer === 'wind') {
            loadOWMLayer(layer);
        }
    }

    // ---- Day Selector ----
    function selectDay(day) {
        currentDay = day;
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.day) === day);
        });
        buildTypeButtons(day);
    }

    function buildTypeButtons(day) {
        const types = DAY_TYPES[day] || [];
        const typeRow = document.getElementById('type-row');
        typeRow.innerHTML = '<span class="ctrl-label">Type:</span>';

        // Default to first type for this day
        currentType = types[0]?.key || 'cat';

        types.forEach((t, i) => {
            const btn = document.createElement('button');
            btn.className = 'type-btn' + (i === 0 ? ' active' : '');
            btn.dataset.type = t.key;
            btn.textContent = t.label;
            btn.onclick = () => selectType(t.key);
            typeRow.appendChild(btn);
        });

        if (currentLayer === 'spc') {
            loadSPCLayer(day, currentType);
        }
    }

    function selectType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.type === type);
        });
        if (currentLayer === 'spc') {
            loadSPCLayer(currentDay, currentType);
        }
    }

    // ---- Loading Overlay ----
    function showLoading(msg) {
        const el = document.getElementById('map-loading');
        el.style.display = 'flex';
        const msgEl = document.getElementById('loading-msg');
        if (msgEl) msgEl.textContent = msg || 'Loading...';
    }

    function hideLoading() {
        document.getElementById('map-loading').style.display = 'none';
    }

    // ---- Map Init ----
    async function initMap() {
        const loc = LocationManager.getCurrent();

        mapboxgl.accessToken = CONFIG.MAPBOX_ACCESS_TOKEN;

        map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [loc.lng, loc.lat],
            zoom: 5,
            projection: 'mercator'
        });

        map.addControl(new mapboxgl.NavigationControl(), 'top-right');

        map.on('load', () => {
            // Find the first symbol (text/label) layer in the style so we can
            // insert data layers below it, keeping town names visible.
            const styleLayers = map.getStyle().layers;
            for (const layer of styleLayers) {
                if (layer.type === 'symbol') {
                    firstSymbolLayerId = layer.id;
                    break;
                }
            }

            // Default: load SPC Day 1 categorical
            buildTypeButtons(1);
            // Map click for OWM exact values
            map.on('click', handleOWMClick);
        });
    }

    // ---- Bootstrap ----
    (async function () {
        const loc = await LocationManager.init();
        const nameEl = document.getElementById('location-name');
        if (nameEl) nameEl.textContent = loc.name;

        await initMap();
    })();
    </script>
</body>
